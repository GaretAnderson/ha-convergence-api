name: "Convergence API"
description: "Always-on API for agent relay, thread board, and pipeline status. Provides real-time cross-machine agent messaging via SSE."
version: "0.4.1"
slug: "convergence_api"
init: false
arch:
  - amd64
  - armhf
  - armv7
  - aarch64
ports:
  8188/tcp: 8188
ports_description:
  8188/tcp: "Convergence API (REST + SSE)"
options:
  github_token: ""
  cards_repo: "GaretAnderson/thread-board-cards"
  relay_max_messages: 500
schema:
  github_token: str
  cards_repo: str
  relay_max_messages: int
