<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Chat</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 8px; }
header h1 { font-size: 16px; font-weight: 600; }
header .status { font-size: 12px; color: #4ecca3; }
#messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; word-break: break-word; }
.msg.sent { align-self: flex-end; background: #0f3460; color: #fff; }
.msg.received { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; }
.msg .from { font-size: 11px; color: #4ecca3; margin-bottom: 4px; }
.msg .text { white-space: pre-wrap; }
.msg .att { display: block; max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 6px; cursor: pointer; }
.msg .del { position: absolute; top: 2px; right: 4px; background: transparent; border: none; color: #aaa; font-size: 15px; line-height: 1; cursor: pointer; opacity: 0.4; padding: 2px; }
.msg:hover .del { opacity: 1; }
.msg .time { font-size: 10px; color: #666; margin-top: 4px; }
#input-bar { padding: 12px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; flex-wrap: wrap; }
#attach-btn { padding: 10px; border-radius: 50%; border: 1px solid #0f3460; background: transparent; color: #4ecca3; font-size: 18px; cursor: pointer; }
#preview { width: 100%; display: none; gap: 6px; flex-wrap: wrap; padding: 4px; }
#preview .thumb { position: relative; display: inline-block; }
#preview .thumb img { max-height: 64px; border-radius: 8px; display: block; }
#preview .thumb button { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; border: none; background: #e94560; color: #fff; font-size: 12px; line-height: 1; cursor: pointer; padding: 0; }
#input-bar input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
#input-bar input:focus { border-color: #4ecca3; }
#input-bar button { padding: 10px 18px; border-radius: 20px; border: none; background: #4ecca3; color: #1a1a2e; font-weight: 600; font-size: 14px; cursor: pointer; }
#input-bar button:active { opacity: 0.8; }
.addressing { padding: 8px 16px; background: #0f3460; display: flex; gap: 6px; overflow-x: auto; }
.addressing button { padding: 4px 10px; border-radius: 12px; border: 1px solid #4ecca3; background: transparent; color: #4ecca3; font-size: 12px; cursor: pointer; white-space: nowrap; }
.addressing button.active { background: #4ecca3; color: #1a1a2e; }
</style>
</head>
<body>
<header>
  <h1>Agent Chat</h1>
  <span class="status" id="status">connecting...</span>
</header>
<div class="addressing">
  <button class="active" data-to="@aorus">@aorus</button>
  <button data-to="@laptop">@laptop</button>
  <button data-to="@all">@all</button>
</div>
<div id="messages"></div>
<div id="preview"></div>
<div id="input-bar">
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <button id="attach-btn" title="Attach image">📎</button>
  <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
  <button id="send-btn">Send</button>
</div>
<script>
const API = window.location.origin;
const TOPIC = 'agent-relay';
let currentTo = '@aorus';
let lastTimestamp = new Date(Date.now() - 3600000).toISOString();

// Addressing buttons
document.querySelectorAll('.addressing button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.addressing button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTo = btn.dataset.to;
  });
});

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function imgTag(url) { return `<img class="att" src="${API}${url}" onclick="window.open('${API}${url}')">`; }

let pendingAttachments = [];   // staged upload URLs for the next message
const seen = new Set();        // rendered message ids (dedup across SSE + history)

function renderMessage(msg) {
  if (!msg || !msg.id || seen.has(msg.id)) return;
  seen.add(msg.id);
  const sent = msg.from === 'phone';
  const div = document.createElement('div');
  div.className = 'msg ' + (sent ? 'sent' : 'received');
  div.dataset.id = msg.id;

  let text = msg.body || '';
  const urls = [];
  const seenUrls = new Set();
  const addUrl = (u) => { if (!seenUrls.has(u)) { seenUrls.add(u); urls.push(u); } };
  if (Array.isArray(msg.attachments)) msg.attachments.forEach(addUrl);
  text = text.replace(/\[image: (\/files\/\S+)\]/g, (_m, u) => { addUrl(u); return ''; });
  const time = new Date(msg.timestamp || Date.now()).toLocaleTimeString();

  div.innerHTML =
    (sent ? '' : `<div class="from">${escapeHtml(msg.from)}</div>`) +
    (text.trim() ? `<span class="text">${escapeHtml(text.trim())}</span>` : '') +
    urls.map(imgTag).join('') +
    `<div class="time">${time}</div>` +
    `<button class="del" title="Delete message">&times;</button>`;
  div.querySelector('.del').addEventListener('click', () => deleteMessage(msg.id));
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function removeMessageEl(id) {
  const el = document.querySelector(`.msg[data-id="${id}"]`);
  if (el) el.remove();
  seen.delete(id);
}

async function deleteMessage(id) {
  try {
    const r = await fetch(`${API}/relay/${TOPIC}/${id}`, { method: 'DELETE' });
    if (r.ok) removeMessageEl(id);
  } catch {}
}

function addSystem(text) {
  const div = document.createElement('div');
  div.className = 'msg received';
  div.innerHTML = `<span class="text">${escapeHtml(text)}</span>`;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

async function send() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const atts = pendingAttachments.slice();
  if (!text && !atts.length) return;
  input.value = '';
  pendingAttachments = [];
  const preview = document.getElementById('preview');
  preview.innerHTML = '';
  preview.style.display = 'none';
  const body = text + atts.map(u => ` [image: ${u}]`).join('');
  try {
    const r = await fetch(`${API}/relay/${TOPIC}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ from: 'phone', to: currentTo, body, attachments: atts, replyTo: 'ha-assist', metadata: {} })
    });
    renderMessage(await r.json());
  } catch (e) { addSystem('Failed to send: ' + e.message); }
}

document.getElementById('send-btn').addEventListener('click', () => send());
document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

// SSE subscription for real-time messages + deletions
function connect() {
  const es = new EventSource(`${API}/relay/${TOPIC}/stream`);
  es.onopen = () => document.getElementById('status').textContent = 'connected';
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.deleted) { removeMessageEl(data.deleted); return; }
      renderMessage(data);
    } catch {}
  };
  es.onerror = () => {
    document.getElementById('status').textContent = 'reconnecting...';
    es.close();
    setTimeout(connect, 5000);
  };
}
connect();

// Load full persisted history (all senders) so refresh / another device shows the same content
fetch(`${API}/relay/${TOPIC}`)
  .then(r => r.json())
  .then(data => (data.messages || []).forEach(renderMessage))
  .catch(() => {});

// Image attachments — paste, drop, or file picker; supports multiple per message
async function uploadImage(file) {
  const resp = await fetch(`${API}/relay/upload`, { method: 'POST', headers: { 'Content-Type': file.type }, body: file });
  const data = await resp.json();
  return data.url;
}

function addThumb(file, url) {
  const preview = document.getElementById('preview');
  const thumb = document.createElement('span');
  thumb.className = 'thumb';
  thumb.innerHTML = `<img src="${URL.createObjectURL(file)}"><button title="Remove">&times;</button>`;
  thumb.querySelector('button').addEventListener('click', () => {
    pendingAttachments = pendingAttachments.filter(u => u !== url);
    thumb.remove();
    if (!pendingAttachments.length) preview.style.display = 'none';
  });
  preview.appendChild(thumb);
  preview.style.display = 'flex';
}

async function stageImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  try { const url = await uploadImage(file); pendingAttachments.push(url); addThumb(file, url); }
  catch (err) { addSystem('Upload failed: ' + err.message); }
}

document.getElementById('attach-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', async (e) => {
  for (const f of Array.from(e.target.files)) await stageImage(f);
  e.target.value = '';
});

window.addEventListener('paste', async (e) => {
  const items = e.clipboardData?.items || [];
  let handled = false;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const f = item.getAsFile();
      if (f) { handled = true; await stageImage(f); }
    }
  }
  if (handled) e.preventDefault();
});

const msgsEl = document.getElementById('messages');
msgsEl.addEventListener('dragover', (e) => e.preventDefault());
msgsEl.addEventListener('drop', async (e) => {
  e.preventDefault();
  for (const f of Array.from(e.dataTransfer.files)) await stageImage(f);
});
</script>
</body>
</html>
